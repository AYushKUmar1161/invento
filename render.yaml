databases:
  - name: inventory_db
    databaseName: inventory_db
    user: postgres
    plan: free

services:
  - type: web
    name: invento-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python seed.py && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: "https://invento-frontend.vercel.app" # Update this with your actual Vercel project domain name!
