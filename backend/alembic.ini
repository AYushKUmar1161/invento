# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# timezone to use when rendering the date within the migration file
# timezone =

# max length of characters to prepend to the "slug" in the migration filename
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow Alembic to fill in the text of the
# list of directories to be migrated
# (used by python-based configs)
# version_locations = %(here)s/bar

# version path separator; defaults to os.pathsep.
# Use a space to span multiple lines on windows
# version_path_separator = :

# set to 'true' to search for migrations recursively within folders
# recursive_version_locations = false

# the database connection URL is set dynamically in env.py,
# but we provide a default placeholder here
sqlalchemy.url = postgresql://postgres:postgrespassword@localhost:5432/inventory_db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
